<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="宿題トラッカー">
<title>宿題トラッカー</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,sans-serif;background:#f0fafa;max-width:480px;margin:0 auto;}
.top-bar{display:flex;background:#fff;border-bottom:2px solid #b2e8e8;position:sticky;top:0;z-index:20;overflow-x:auto;}
.class-tab{flex-shrink:0;padding:12px 16px;font-size:13px;color:#5f9ea0;cursor:pointer;border:none;background:none;border-bottom:3px solid transparent;white-space:nowrap;font-weight:600;}
.class-tab.on{color:#fff;background:linear-gradient(135deg,#2ec4b6,#1a9e96);border-bottom:3px solid #2ec4b6;border-radius:8px 8px 0 0;}
.tab-bar{display:flex;background:#e0f7f7;border-bottom:1px solid #b2e8e8;}
.tab{flex:1;padding:10px 2px;font-size:11px;text-align:center;color:#5f9ea0;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;font-weight:500;}
.tab.on{color:#2ec4b6;border-bottom-color:#2ec4b6;font-weight:700;}
.screen{display:none;padding:16px;}
.screen.active{display:block;}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(46,196,182,0.1);border:1px solid #e0f7f7;}
.section-title{font-size:13px;color:#2ec4b6;font-weight:700;margin-bottom:12px;letter-spacing:0.5px;}
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.date-nav button{width:34px;height:34px;border-radius:50%;border:2px solid #2ec4b6;background:#fff;cursor:pointer;font-size:18px;color:#2ec4b6;}
.date-nav span{font-size:15px;font-weight:700;color:#1a7a76;}
.date-selector{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:6px;}
.date-btn{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid #b2e8e8;background:#fff;cursor:pointer;font-size:13px;color:#5f9ea0;font-weight:500;}
.date-btn.on{background:linear-gradient(135deg,#2ec4b6,#1a9e96);color:#fff;border-color:#2ec4b6;font-weight:700;}
.student-check-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid #e0f7f7;}
.student-check-row:last-child{border-bottom:none;}
.st-name{font-size:15px;font-weight:700;color:#1a7a76;}
.st-count{font-size:11px;color:#5f9ea0;margin-top:2px;}
.big-check{width:28px;height:28px;accent-color:#2ec4b6;cursor:pointer;}
.month-input-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e0f7f7;}
.month-input-row:last-child{border-bottom:none;}
.month-input-row label{font-size:14px;color:#1a7a76;font-weight:600;}
.month-input-row input{width:70px;font-size:16px;font-weight:700;text-align:center;border:2px solid #b2e8e8;border-radius:10px;padding:6px;color:#1a7a76;}
.month-save-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#f59e0b,#e08b00);color:#fff;font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;}
.week-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e0f7f7;}
.week-toggle label{font-size:14px;color:#1a7a76;font-weight:600;}
.toggle-sw{position:relative;width:44px;height:26px;}
.toggle-sw input{opacity:0;width:0;height:0;}
.toggle-sl{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:26px;transition:.3s;}
.toggle-sl:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s;}
input:checked+.toggle-sl{background:#2ec4b6;}
input:checked+.toggle-sl:before{transform:translateX(18px);}
.elmo-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #e0f7f7;}
.elmo-row:last-child{border-bottom:none;}
.elmo-name{font-size:14px;color:#1a7a76;font-weight:500;}
.elmo-check{width:24px;height:24px;accent-color:#2ec4b6;cursor:pointer;}
.season-card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(46,196,182,0.1);border:1px solid #e0f7f7;}
.sname{font-size:15px;font-weight:700;margin-bottom:10px;color:#1a7a76;}
.stitle{font-size:12px;font-weight:700;color:#2ec4b6;margin:10px 0 6px;letter-spacing:0.5px;}
.srow{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #e0f7f7;font-size:13px;color:#444;}
.spt{font-weight:700;color:#2ec4b6;}
.carry{background:#e0f7f7;border-radius:10px;padding:8px 12px;font-size:12px;color:#1a7a76;margin:6px 0;font-weight:600;}
.msg-box{background:#fff;border-radius:16px;padding:16px;font-size:14px;line-height:1.8;color:#333;white-space:pre-wrap;box-shadow:0 2px 8px rgba(46,196,182,0.1);border:1px solid #e0f7f7;}
.copy-btn{margin-top:10px;width:100%;padding:12px;border-radius:12px;border:2px solid #2ec4b6;background:#fff;cursor:pointer;font-size:14px;font-weight:700;color:#2ec4b6;}
.msel{font-size:14px;padding:8px 12px;border-radius:12px;border:2px solid #b2e8e8;background:#fff;color:#1a7a76;margin-bottom:14px;width:100%;font-weight:600;}
.srow2{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.srow2 input[type=text]{flex:1;font-size:15px;padding:8px 12px;border-radius:10px;border:2px solid #b2e8e8;background:#fff;color:#1a7a76;}
.dbtn{width:30px;height:30px;border-radius:50%;border:1.5px solid #b2e8e8;background:none;cursor:pointer;color:#5f9ea0;}
.add-btn{width:100%;padding:10px;border:2px dashed #b2e8e8;border-radius:12px;background:none;cursor:pointer;font-size:14px;color:#5f9ea0;margin-top:4px;}
.cfg-save-btn{width:100%;padding:12px;border-radius:12px;border:none;background:linear-gradient(135deg,#2ec4b6,#1a9e96);cursor:pointer;font-size:15px;font-weight:700;color:#fff;margin-top:14px;}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.month-nav button{width:34px;height:34px;border-radius:50%;border:2px solid #2ec4b6;background:#fff;cursor:pointer;font-size:18px;color:#2ec4b6;}
.month-nav span{font-size:15px;font-weight:700;color:#1a7a76;}
.ame-badge{background:linear-gradient(135deg,#fef9c3,#fde68a);color:#854d0e;font-size:11px;padding:3px 10px;border-radius:20px;margin-bottom:6px;display:inline-block;font-weight:700;}
.hero{background:linear-gradient(135deg,#2ec4b6,#1a9e96);padding:16px;margin-bottom:4px;text-align:center;}
.hero h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:1px;}
.hero p{color:#e0fafa;font-size:12px;margin-top:4px;}
</style>
</head>
<body>
<div class="hero"><h1>🎵 Miracle English</h1><p>家庭学習トラッカー</p></div>
<div class="top-bar" id="ctabs"></div>
<div class="tab-bar">
  <button class="tab on" onclick="showSub('ondoku',this)">音読</button>
  <button class="tab" onclick="showSub('review',this)">ホームレビュー</button>
  <button class="tab" onclick="showSub('elmo',this)">エルモ</button>
  <button class="tab" onclick="showSub('season',this)">集計</button>
  <button class="tab" onclick="showSub('msg',this)">メッセージ</button>
  <button class="tab" onclick="showSub('cfg',this)">設定</button>
</div>

<div id="s-ondoku" class="screen active">
  <p class="section-title">📖 音読チェック</p>
  <div class="month-nav">
    <button onclick="pm()">&#8249;</button>
    <span id="ondoku-month-label"></span>
    <button onclick="nm()">&#8250;</button>
  </div>
  <div class="date-selector" id="date-selector"></div>
  <div class="card" id="ondoku-checklist"></div>
</div>

<div id="s-review" class="screen">
  <p class="section-title">⭐ ホームレビュー（月次入力）</p>
  <div class="month-nav">
    <button onclick="rpm()">&#8249;</button>
    <span id="review-month-label"></span>
    <button onclick="rnm()">&#8250;</button>
  </div>
  <div class="card" id="review-inputs"></div>
  <button class="month-save-btn" onclick="saveReview()">保存する</button>
</div>

<div id="s-elmo" class="screen">
  <p class="section-title">📝 エルモのホームワーク</p>
  <div class="month-nav">
    <button onclick="epm()">&#8249;</button>
    <span id="elmo-month-label"></span>
    <button onclick="enm()">&#8250;</button>
  </div>
  <div id="elmo-weeks"></div>
</div>

<div id="s-season" class="screen">
  <p class="section-title">📊 シーズン集計</p>
  <select class="msel" id="season-sel" onchange="renderSeason()"></select>
  <div id="season-content"></div>
</div>

<div id="s-msg" class="screen">
  <p class="section-title">💌 保護者向けメッセージ</p>
  <select class="msel" id="msel" onchange="renderMsg()"></select>
  <div class="msg-box" id="msgout"></div>
  <button class="copy-btn" onclick="copyMsg()">コピーする</button>
</div>

<div id="s-cfg" class="screen">
  <p class="section-title" id="cfg-title">⚙️ 設定</p>
  <div id="namelist"></div>
  <button class="add-btn" onclick="addSt()">+ 生徒を追加</button>
  <button class="cfg-save-btn" onclick="saveNames()">保存する</button>
</div>

<script>
var MN=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
var SS=[{n:'春',m:[3,4,5],i:'🌸'},{n:'夏',m:[6,7,8],i:'☀️'},{n:'秋',m:[9,10,11],i:'🍂'},{n:'冬',m:[12,1,2],i:'⛄️'}];
var CL=[
  {id:'p3',name:'P3教室',ame:true,st:['あかり','けんた','まさき','しゅうや','そう','はやと']},
  {id:'p4',name:'P4オンライン',ame:false,st:['岡埜朱里','石母田咲希','神戸はると','神田ともあき']}
];
var DAT={};
var ci=0;
var now=new Date();
var cy=now.getFullYear(),cm=now.getMonth()+1;
var ry=now.getFullYear(),rm=now.getMonth()+1;
var ey=now.getFullYear(),em=now.getMonth()+1;
var selDay=now.getDate();
var csub='ondoku';

try{var t=localStorage.getItem('oc2');if(t)CL=JSON.parse(t);}catch(e){}
try{var t2=localStorage.getItem('od2');if(t2)DAT=JSON.parse(t2);}catch(e){}

function sv(){try{localStorage.setItem('oc2',JSON.stringify(CL));localStorage.setItem('od2',JSON.stringify(DAT));}catch(e){}}
function pad(n){return String(n).padStart(2,'0');}
function dim(y,m){return new Date(y,m,0).getDate();}

function ondokuKey(id,n,y,m,d){return 'on|'+id+'|'+n+'|'+y+'-'+pad(m)+'-'+pad(d);}
function getOndoku(id,n,y,m,d){return DAT[ondokuKey(id,n,y,m,d)]||false;}
function setOndoku(id,n,y,m,d,v){DAT[ondokuKey(id,n,y,m,d)]=v;sv();}
function monthOndokuCount(id,n,y,m){var c=0,D=dim(y,m);for(var d=1;d<=D;d++)if(getOndoku(id,n,y,m,d))c++;return c;}
function weekOndokuCount(id,n,y,m){
  var now2=new Date(),ws=new Date(now2);ws.setDate(now2.getDate()-now2.getDay());
  var c=0;
  for(var i=0;i<7;i++){var dd=new Date(ws);dd.setDate(ws.getDate()+i);if(dd.getFullYear()===y&&dd.getMonth()+1===m&&getOndoku(id,n,y,m,dd.getDate()))c++;}
  return c;
}

function reviewKey(id,n,y,m){return 'rv|'+id+'|'+n+'|'+y+'-'+pad(m);}
function getReview(id,n,y,m){return DAT[reviewKey(id,n,y,m)]||0;}
function setReview(id,n,y,m,v){DAT[reviewKey(id,n,y,m)]=parseInt(v)||0;sv();}

function elmoWeekKey(id,n,y,m,w){return 'el|'+id+'|'+n+'|'+y+'-'+pad(m)+'-w'+w;}
function getElmo(id,n,y,m,w){return DAT[elmoWeekKey(id,n,y,m,w)]||false;}
function setElmo(id,n,y,m,w,v){DAT[elmoWeekKey(id,n,y,m,w)]=v;sv();}
function elmoActiveKey(id,y,m,w){return 'elact|'+id+'|'+y+'-'+pad(m)+'-w'+w;}
function getElmoActive(id,y,m,w){return DAT[elmoActiveKey(id,y,m,w)]||false;}
function setElmoActive(id,y,m,w,v){DAT[elmoActiveKey(id,y,m,w)]=v;sv();}

function weeksInMonth(y,m){var first=new Date(y,m-1,1).getDay();var days=dim(y,m);return Math.ceil((first+days)/7);}
function weekLabel(y,m,w){
  var first=new Date(y,m-1,1).getDay();
  var start=w===0?1:w*7-first+1;
  if(start<1)start=1;
  var end=start+6;if(end>dim(y,m))end=dim(y,m);
  return m+'月'+start+'日〜'+end+'日';
}

function renderTabs(){
  var el=document.getElementById('ctabs');el.innerHTML='';
  for(var i=0;i<CL.length;i++){
    (function(idx){
      var b=document.createElement('button');
      b.className='class-tab'+(idx===ci?' on':'');
      b.textContent=CL[idx].name;
      b.onclick=function(){ci=idx;renderTabs();renderSub2();};
      el.appendChild(b);
    })(i);
  }
}

function renderOndoku(){
  var cl=CL[ci],y=cy,m=cm;
  document.getElementById('ondoku-month-label').textContent=y+'年'+MN[m-1];
  var days=dim(y,m);
  var h='';
  for(var d=1;d<=days;d++){
    h+='<button class="date-btn'+(d===selDay?' on':'')+'" onclick="selDate('+d+')">'+d+'日</button>';
  }
  document.getElementById('date-selector').innerHTML=h;
  var ch='';
  for(var si=0;si<cl.st.length;si++){
    var name=cl.st[si];
    var checked=getOndoku(cl.id,name,y,m,selDay);
    var mc=monthOndokuCount(cl.id,name,y,m);
    var wc=weekOndokuCount(cl.id,name,y,m);
    var ame=cl.ame&&wc>=5;
    ch+='<div class="student-check-row">';
    ch+='<div>';
    if(ame)ch+='<div class="ame-badge">🍬 今週5回達成！</div>';
    ch+='<div class="st-name">'+name+'</div>';
    ch+='<div class="st-count">今月'+mc+'回 / 今週'+wc+'回</div></div>';
    ch+='<input type="checkbox" class="big-check" id="ck-'+si+'"'+(checked?' checked':'')+' onchange="toggleOndoku(\''+name.replace(/'/g,"\\'")+'\','+si+')">';
    ch+='</div>';
  }
  document.getElementById('ondoku-checklist').innerHTML=ch;
}

function selDate(d){selDay=d;renderOndoku();}
function toggleOndoku(name,si){var cl=CL[ci];var v=document.getElementById('ck-'+si).checked;setOndoku(cl.id,name,cy,cm,selDay,v);renderOndoku();}
function pm(){cm--;if(cm<1){cm=12;cy--;}selDay=1;renderOndoku();}
function nm(){cm++;if(cm>12){cm=1;cy++;}selDay=1;renderOndoku();}

function renderReview(){
  var cl=CL[ci];
  document.getElementById('review-month-label').textContent=ry+'年'+MN[rm-1];
  var h='';
  for(var si=0;si<cl.st.length;si++){
    var name=cl.st[si];
    var v=getReview(cl.id,name,ry,rm);
    h+='<div class="month-input-row"><label>'+name+'</label>';
    h+='<input type="number" min="0" max="31" value="'+v+'" id="rv-'+si+'"></div>';
  }
  document.getElementById('review-inputs').innerHTML=h;
}

function saveReview(){
  var cl=CL[ci];
  for(var si=0;si<cl.st.length;si++){setReview(cl.id,cl.st[si],ry,rm,document.getElementById('rv-'+si).value);}
  var btn=document.querySelector('.month-save-btn');
  btn.textContent='保存しました！';setTimeout(function(){btn.textContent='保存する';},1500);
}

function rpm(){rm--;if(rm<1){rm=12;ry--;}renderReview();}
function rnm(){rm++;if(rm>12){rm=1;ry++;}renderReview();}

function renderElmo(){
  var cl=CL[ci];
  document.getElementById('elmo-month-label').textContent=ey+'年'+MN[em-1];
  var weeks=weeksInMonth(ey,em);
  var h='';
  for(var w=0;w<weeks;w++){
    var active=getElmoActive(cl.id,ey,em,w);
    h+='<div class="card"><div class="week-toggle">';
    h+='<label>第'+(w+1)+'週（'+weekLabel(ey,em,w)+'）</label>';
    h+='<label class="toggle-sw"><input type="checkbox" id="elact-'+w+'"'+(active?' checked':'')+' onchange="toggleElmoActive('+w+')"><span class="toggle-sl"></span></label>';
    h+='</div>';
    if(active){
      for(var si=0;si<cl.st.length;si++){
        var name=cl.st[si];
        var done=getElmo(cl.id,name,ey,em,w);
        h+='<div class="elmo-row"><span class="elmo-name">'+name+'</span>';
        h+='<input type="checkbox" class="elmo-check" id="elmo-'+w+'-'+si+'"'+(done?' checked':'')+' onchange="toggleElmo(\''+name.replace(/'/g,"\\'")+'\','+w+','+si+')"></div>';
      }
    }
    h+='</div>';
  }
  document.getElementById('elmo-weeks').innerHTML=h;
}

function toggleElmoActive(w){var cl=CL[ci];setElmoActive(cl.id,ey,em,w,document.getElementById('elact-'+w).checked);renderElmo();}
function toggleElmo(name,w,si){var cl=CL[ci];setElmo(cl.id,name,ey,em,w,document.getElementById('elmo-'+w+'-'+si).checked);}
function epm(){em--;if(em<1){em=12;ey--;}renderElmo();}
function enm(){em++;if(em>12){em=1;ey++;}renderElmo();}

function renderSeasonSelect(){
  var sel=document.getElementById('season-sel');
  var opts='';
  for(var i=0;i<SS.length;i++)opts+='<option value="'+i+'">'+SS[i].i+' '+SS[i].n+'シーズン</option>';
  sel.innerHTML=opts;
  var nowM=new Date().getMonth()+1;
  for(var i=0;i<SS.length;i++){if(SS[i].m.indexOf(nowM)>=0){sel.value=i;break;}}
  renderSeason();
}

function renderSeason(){
  var cl=CL[ci],sei=parseInt(document.getElementById('season-sel').value),s=SS[sei];
  var now2=new Date(),ty=now2.getFullYear();
  var h='';
  for(var si=0;si<cl.st.length;si++){
    var name=cl.st[si],tot=0;
    h+='<div class="season-card"><div class="sname">'+name+'</div><div class="stitle">月別詳細</div>';
    for(var mi2=0;mi2<s.m.length;mi2++){
      var mo=s.m[mi2],yr=ty;
      if(mo>=10&&now2.getMonth()+1<=2)yr=ty-1;
      var rc=monthOndokuCount(cl.id,name,yr,mo),rv=getReview(cl.id,name,yr,mo),pt=(rc+rv)*5;
      tot+=pt;
      h+='<div class="srow"><span>'+MN[mo-1]+'</span><span>音読'+rc+' HR'+rv+'</span><span class="spt">'+pt+'pt</span></div>';
    }
    var units=[1000,700,500,200],card=0;
    for(var ui=0;ui<units.length;ui++)while(tot-card>=units[ui])card+=units[ui];
    h+='<div class="srow" style="font-weight:700"><span>合計</span><span></span><span class="spt">'+tot+'pt</span></div>';
    h+='<div class="carry">🎁 図書カード '+card+'pt分 ／ 繰越 '+(tot-card)+'pt</div></div>';
  }
  document.getElementById('season-content').innerHTML=h;
}

function renderMsgScreen(){
  var now2=new Date(),sel=document.getElementById('msel'),opts='';
  for(var i=0;i<6;i++){
    var d=new Date(now2.getFullYear(),now2.getMonth()-i,1);
    opts+='<option value="'+d.getFullYear()+'-'+pad(d.getMonth()+1)+'">'+d.getFullYear()+'年'+MN[d.getMonth()]+'</option>';
  }
  sel.innerHTML=opts;renderMsg();
}

function renderMsg(){
  var cl=CL[ci],v=document.getElementById('msel').value,p=v.split('-'),y=parseInt(p[0]),m=parseInt(p[1]);
  var lines='【'+y+'年'+MN[m-1]+'の家庭学習レポート】\n\nみなさん、今月もよくがんばりました！\n\n';
  for(var i=0;i<cl.st.length;i++){
    var n=cl.st[i],rc=monthOndokuCount(cl.id,n,y,m),rv=getReview(cl.id,n,y,m),pt=(rc+rv)*5;
    lines+='⭐ '+n+' さん\n　音読：'+rc+'回　ホームレビュー：'+rv+'回　→ '+pt+'ポイント\n\n';
  }
  lines+='引き続き毎日の家庭学習をよろしくお願いします🎵';
  document.getElementById('msgout').textContent=lines;
}

function copyMsg(){
  navigator.clipboard.writeText(document.getElementById('msgout').textContent).then(function(){
    var b=document.querySelector('.copy-btn');b.textContent='コピーしました！';setTimeout(function(){b.textContent='コピーする';},1500);
  });
}

function renderCfg(){
  var cl=CL[ci];
  document.getElementById('cfg-title').textContent='⚙️ '+cl.name+' — 生徒名編集';
  var h='';
  for(var i=0;i<cl.st.length;i++)
    h+='<div class="srow2"><input type="text" value="'+cl.st[i]+'" id="sn-'+i+'"><button class="dbtn" onclick="delSt('+i+')">x</button></div>';
  document.getElementById('namelist').innerHTML=h;
}

function addSt(){CL[ci].st.push('新しい生徒');renderCfg();}
function delSt(i){CL[ci].st.splice(i,1);renderCfg();}
function saveNames(){
  var inputs=document.querySelectorAll('[id^="sn-"]'),arr=[];
  for(var i=0;i<inputs.length;i++){var v=inputs[i].value.trim();if(v)arr.push(v);}
  CL[ci].st=arr;sv();renderCfg();renderOndoku();
  var b=document.querySelector('.cfg-save-btn');b.textContent='保存しました！';setTimeout(function(){b.textContent='保存する';},1500);
}

function showSub(name,tabEl){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('s-'+name).classList.add('active');
  tabEl.classList.add('on');csub=name;renderSub2();
}

function renderSub2(){
  if(csub==='ondoku')renderOndoku();
  else if(csub==='review')renderReview();
  else if(csub==='elmo')renderElmo();
  else if(csub==='season')renderSeasonSelect();
  else if(csub==='msg')renderMsgScreen();
  else if(csub==='cfg')renderCfg();
}

renderTabs();
renderOndoku();
</script>
</body>
</html>
